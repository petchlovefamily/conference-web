services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: conference-web
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
